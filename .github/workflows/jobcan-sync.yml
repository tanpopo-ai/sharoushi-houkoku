name: jobcan-sync

# ジョブカン勤怠 → Googleスプレッドシート 自動取り込み (クラウド実行・PC不要)
#   毎日 JST 0:30 に実行。手動実行(Run workflow)も可能。
#   必要な Secrets: JOBCAN_CLIENT_ID / JOBCAN_LOGIN_ID / JOBCAN_PASSWORD /
#                   GOOGLE_SERVICE_ACCOUNT_JSON   (jobcan_sync/SETUP.md 参照)

on:
  schedule:
    - cron: "30 15 * * *"   # 15:30 UTC = 翌 00:30 JST
  workflow_dispatch: {}      # 画面から手動実行できるように

concurrency:
  group: jobcan-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: jobcan_sync
    env:
      TZ: Asia/Tokyo
      JOBCAN_CLIENT_ID: ${{ secrets.JOBCAN_CLIENT_ID }}
      JOBCAN_LOGIN_ID: ${{ secrets.JOBCAN_LOGIN_ID }}
      JOBCAN_PASSWORD: ${{ secrets.JOBCAN_PASSWORD }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: jobcan_sync/requirements.txt

      - name: 依存関係をインストール
        run: pip install -r requirements.txt

      - name: Playwright (Chromium) をインストール
        run: python -m playwright install --with-deps chromium

      - name: 取り込み実行
        run: python main.py

      - name: ログを成果物として保存 (デバッグ用)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobcan-sync-logs
          path: |
            jobcan_sync/logs/
            jobcan_sync/*.png
          if-no-files-found: ignore
          retention-days: 7
